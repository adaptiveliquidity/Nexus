# Nexus CI — runs on every push and PR.
#
# Mirrors the harness-upgrade section of the build plan:
#   1. Install the userspace toolchain (rustup, cargo, hyperfine, wat2wasm).
#   2. cargo test --all-targets (includes the Phase A regression test).
#   3. bash validate.sh 0 3 (Phase 0 specs + Phase 3 capture w/ AI verdict gate).
#   4. clippy -D warnings + cargo audit on the lib + bins.
#
# The "AI rescore" step is a separate workflow (.github/workflows/ai-rescore.yml)
# that runs only on merge to main when recovery-path files change. It costs
# real LLM tokens so it does not run on PRs.

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "dashboard/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "dashboard/**"
      - "**/*.md"

permissions:
  contents: read

jobs:
  test:
    name: cargo test + validate phases 0/3
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
          components: clippy

      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install hyperfine + wabt
        run: |
          curl -fsSL -o /tmp/hf.tgz \
            "https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine-v1.18.0-x86_64-unknown-linux-musl.tar.gz"
          echo "ef3855ad6a1bf97055a90dc3dfc5d4a48494cb80344027db932a96341d415193  /tmp/hf.tgz" | sha256sum -c -
          tar -xzf /tmp/hf.tgz -C /tmp
          sudo install -m 0755 /tmp/hyperfine-v1.18.0-x86_64-unknown-linux-musl/hyperfine /usr/local/bin/
          curl -fsSL -o /tmp/wabt.tgz \
            "https://github.com/WebAssembly/wabt/releases/download/1.0.36/wabt-1.0.36-ubuntu-20.04.tar.gz"
          echo "4aa0929db06c2376cc76f6d9e920dbde2ea6f1fd55bbaed6cd65167e9e39ecd3  /tmp/wabt.tgz" | sha256sum -c -
          tar -xzf /tmp/wabt.tgz -C /tmp
          sudo install -m 0755 /tmp/wabt-1.0.36/bin/wat2wasm /usr/local/bin/

      - name: cargo test --all-targets
        run: cargo test --all-targets --locked

      - name: Phase A regression test
        run: cargo test --test phase3_distinct_outputs --locked

      - name: validate.sh phases 0 + 3
        env:
          CARGO_TARGET_DIR: ./target
        run: |
          mkdir -p artifacts/raw artifacts/plots
          bash scripts/setup_benchmark_env.sh
          bash scripts/run_phase3_capture.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: validation-artifacts
          path: |
            artifacts/specs.json
            artifacts/raw/phase3_index.json
            artifacts/raw/phase3_*.json

  clippy:
    name: clippy + audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: cargo audit
        run: |
          cargo install --locked cargo-audit
          cargo audit

  aeon-memory-tests:
    name: aeon-memory-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo test --features aeon-memory
        run: cargo test --features aeon-memory --locked
      - name: aeon_nexus_bridge tests
        run: cargo test -p aeon_nexus_bridge --locked

  aeon-memory-clippy:
    name: aeon-memory-clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: cargo clippy --features aeon-memory
        run: cargo clippy --features aeon-memory --locked -- -D warnings
