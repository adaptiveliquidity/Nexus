name: Benchmarks

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "**/*.md"
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  checks: write   # bencher needs this to post a GitHub Check on push/dispatch runs

jobs:
  bencher:
    name: "Criterion → Bencher.dev"
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: bench-${{ runner.os }}
      - uses: bencherdev/bencher@ec56bb69a7f34096002ca3384d10e2f6676b063e # v0.6.7

      - name: Record runner provenance
        run: |
          mkdir -p benchmark_evidence
          {
            echo "## Runner Provenance"
            echo "- Date (UTC): $(date -u --iso-8601=seconds)"
            echo "- Commit: ${{ github.sha }}"
            echo "- Runner: ubuntu-24.04 (GitHub-hosted)"
            echo "- CPU: $(grep -m1 'model name' /proc/cpuinfo | cut -d: -f2 | xargs)"
            echo "- Cores: $(nproc)"
            echo "- Memory: $(free -h | awk '/^Mem:/ {print $2}')"
            echo "- Kernel: $(uname -r)"
            echo "- rustc: $(rustc --version)"
          } > benchmark_evidence/runner.md

      # Detect whether external benchmark services are configured. PR runs from
      # forks can't see secrets, and config drift on the main repo can leave one
      # of these unset. We resolve this once into an env flag so downstream steps
      # can conditionally upload — the bench itself always runs so contributors
      # can still iterate locally and CI artifacts are always produced.
      - name: Detect external service configuration
        id: config
        run: |
          if [ -n "${{ vars.BENCHER_PROJECT }}" ] && [ -n "${{ secrets.BENCHER_API_TOKEN }}" ]; then
            echo "bencher_configured=true" >> "$GITHUB_OUTPUT"
            echo "✓ Bencher.dev upload is configured"
          else
            echo "bencher_configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠ Bencher.dev upload will be skipped"
            echo "  vars.BENCHER_PROJECT set: $([ -n "${{ vars.BENCHER_PROJECT }}" ] && echo yes || echo no)"
            echo "  secrets.BENCHER_API_TOKEN set: $([ -n "${{ secrets.BENCHER_API_TOKEN }}" ] && echo yes || echo no)"
            echo "  See SETUP.md — BENCHER_PROJECT goes under 'Variables' (not 'Secrets')"
          fi

      # Native Criterion output — Bencher's rust_criterion adapter parses this
      # directly. Do NOT pass --output-format bencher; that produces libtest-style
      # output meant for the rust_bench adapter, and would cause Bencher to fail
      # parsing.
      - name: Run Criterion
        run: |
          cargo bench --bench nexus_validation \
            | tee benchmark_evidence/criterion_raw.log

      # ── Push / schedule / dispatch: record baseline on the target branch ──
      # Tracks latency (upper boundary — slower is bad) with Student's t-test
      # at 99th percentile, 2–64 sample rolling window. The rust_criterion
      # adapter only emits latency data; throughput thresholds are not applicable.
      - name: Upload to Bencher.dev (push)
        if: steps.config.outputs.bencher_configured == 'true' && github.event_name != 'pull_request'
        run: |
          bencher run \
            --project "${{ vars.BENCHER_PROJECT }}" \
            --token "${{ secrets.BENCHER_API_TOKEN }}" \
            --branch "${{ github.ref_name }}" \
            --hash "${{ github.sha }}" \
            --testbed "ubuntu-24.04-github" \
            --adapter rust_criterion \
            --github-actions "${{ secrets.GITHUB_TOKEN }}" \
            --err \
            --threshold-measure latency \
            --threshold-test t_test \
            --threshold-min-sample-size 2 \
            --threshold-max-sample-size 64 \
            --threshold-upper-boundary 0.99 \
            --file benchmark_evidence/criterion_raw.log

      - name: Track binary sizes in Bencher
        if: steps.config.outputs.bencher_configured == 'true' && github.event_name != 'pull_request'
        run: |
          cargo build --release --bin nexus --bin nexus-agentd 2>/dev/null
          bencher run \
            --project "${{ vars.BENCHER_PROJECT }}" \
            --token "${{ secrets.BENCHER_API_TOKEN }}" \
            --branch "${{ github.ref_name }}" \
            --hash "${{ github.sha }}" \
            --testbed "ubuntu-24.04-github" \
            --threshold-measure file-size \
            --threshold-test percentage \
            --threshold-upper-boundary 0.10 \
            --file-size target/release/nexus \
            --file-size target/release/nexus-agentd \
            --github-actions "${{ secrets.GITHUB_TOKEN }}"

      # ── PR: compare against base branch, fail on regression ──
      - name: Upload to Bencher.dev (PR)
        if: steps.config.outputs.bencher_configured == 'true' && github.event_name == 'pull_request'
        env:
          BENCHER_PROJECT: ${{ vars.BENCHER_PROJECT }}
          BENCHER_API_TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          BENCHER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BASE_REF: ${{ github.base_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          bencher run \
            --project "$BENCHER_PROJECT" \
            --token "$BENCHER_API_TOKEN" \
            --branch "$HEAD_REF" \
            --hash "$HEAD_SHA" \
            --start-point "$BASE_REF" \
            --start-point-hash "$BASE_SHA" \
            --start-point-clone-thresholds \
            --start-point-reset \
            --testbed "ubuntu-24.04-github" \
            --adapter rust_criterion \
            --github-actions "$BENCHER_GITHUB_TOKEN" \
            --ci-only-on-alert \
            --ci-number "$PR_NUMBER" \
            --error-on-alert \
            --file benchmark_evidence/criterion_raw.log

      - uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9 # pinned SHA
      - name: Sign artifacts with Sigstore
        continue-on-error: true
        run: |
          tar czf benchmark_evidence/criterion_artifacts.tar.gz \
            target/criterion benchmark_evidence/runner.md \
            benchmark_evidence/criterion_raw.log
          cosign sign-blob --yes \
            --bundle benchmark_evidence/criterion_artifacts.sigstore \
            benchmark_evidence/criterion_artifacts.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: criterion-evidence-${{ github.sha }}
          path: benchmark_evidence/
          retention-days: 90

  codspeed:
    name: "Criterion → CodSpeed.io (CPU simulation + memory)"
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    if: ${{ vars.CODSPEED_ENABLED != 'false' }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: codspeed-${{ runner.os }}
      - name: Install cargo-codspeed (prebuilt)
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-codspeed
      - uses: CodSpeedHQ/action@c8ffb9ced3005b12a98162811dcf60cf520da534 # pinned SHA
        with:
          mode: simulation,memory
          run: |
            cargo codspeed build --bench nexus_validation \
              --features bench-cold-start,bench-snapshot-create,bench-snapshot-rollback,bench-execute-tool,bench-execute-real-memory,bench-integrated
            cargo codspeed run --bench nexus_validation

  codspeed-walltime:
    name: "Criterion → CodSpeed.io (bare-metal walltime)"
    runs-on: codspeed-macro
    timeout-minutes: 75
    continue-on-error: true
    if: ${{ vars.CODSPEED_WALLTIME_ENABLED == 'true' && github.event_name != 'pull_request' }}
    permissions:
      contents: read
      id-token: write
    # Workaround: cargo-codspeed v4 walltime mode does not set cfg(codspeed)
    # during build, so the benchmark compiles the plain Criterion path and the
    # profiler cannot detect it. Force the flag so codspeed-criterion-compat is
    # used and emits profiler-detectable benchmark events.
    env:
      RUSTFLAGS: "--cfg codspeed"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable
      - name: Install cargo-codspeed (prebuilt)
        uses: taiki-e/install-action@15449e3094499af05d8d964a1c884208e4b8b595 # v2.81.11
        with:
          tool: cargo-codspeed
      - name: Verify compat version
        run: cargo tree -p codspeed-criterion-compat
      - name: Build CodSpeed walltime benchmark
        run: |
          cargo codspeed build --bench nexus_validation \
            --features bench-cold-start
      - name: Run CodSpeed walltime benchmark
        uses: CodSpeedHQ/action@c8ffb9ced3005b12a98162811dcf60cf520da534 # pinned SHA
        with:
          mode: walltime
          run: cargo codspeed run

  update-readme-svg:
    name: Update benchmark SVG in README
    needs: [bencher]
    if: github.ref == 'refs/heads/main' && needs.bencher.result == 'success'
    runs-on: ubuntu-24.04
    permissions:
      # Required only for the generated benchmark SVG commit below. The job is
      # already limited to refs/heads/main after a successful benchmark upload.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.SVG_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          name: criterion-evidence-${{ github.sha }}
          path: benchmark_evidence

      - name: Generate SVG from Criterion results
        run: python3 scripts/generate_benchmark_svg.py benchmark_evidence/criterion_raw.log

      - name: Push SVG if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/benchmark-chart.svg
          if git diff --cached --quiet; then
            echo "No changes to benchmark SVG"
            exit 0
          fi
          git commit -m "docs: auto-update benchmark chart [skip ci]"
          git push origin main

  publish-dashboard:
    name: Publish public dashboard
    needs: [bencher, codspeed, codspeed-walltime]
    if: |
      always() &&
      github.ref == 'refs/heads/main' &&
      needs.bencher.result == 'success' &&
      (needs.codspeed.result == 'success' || needs.codspeed.result == 'skipped') &&
      (needs.codspeed-walltime.result == 'success' || needs.codspeed-walltime.result == 'skipped')
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: criterion-evidence-${{ github.sha }}
          path: benchmark_evidence
      - name: Generate benchmark JSON for dashboard
        run: python3 scripts/criterion_to_json.py benchmark_evidence/criterion_raw.log dashboard/benchmark-data.json
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json
      - name: Build dashboard
        run: |
          cd dashboard
          npm ci
          npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/out
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
