name: Cargo Deny

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "dashboard/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "dashboard/**"
      - "**/*.md"

permissions:
  contents: read

jobs:
  deny-check:
    name: deny-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch as of 2026-06-16
        with:
          toolchain: stable

      - name: Install cargo-deny
        run: cargo install --locked cargo-deny

      - name: cargo deny check all
        run: cargo deny check all
